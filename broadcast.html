<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoloWorker SaaS - Broadcast Pesan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-gradient { background: linear-gradient(135deg, #25D366, #128C7E); color: white; border: none; }
        .btn-gradient:hover { color: white; opacity: 0.9; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="mb-3 d-flex justify-content-between align-items-center">
        <a href="index.html" class="btn btn-sm btn-light border fw-semibold text-muted">
            <i class="bi bi-arrow-left"></i> Kembali ke Dashboard
        </a>
    </div>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card card-custom p-4 bg-white mb-4">
                <h4 class="fw-bold text-success mb-3"><i class="bi bi-send-check"></i> Kirim WhatsApp Massal</h4>
                <div class="mb-3">
                    <label class="form-label fw-bold text-muted">1. Pilih Folder Target</label>
                    <select id="select-folder" class="form-select form-select-lg">
                        <option value="">-- Memuat data... --</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-muted">2. Isi Teks Pesan</label>
                    <textarea id="input-pesan" class="form-control" rows="6" placeholder="Halo..."></textarea>
                </div>
                <button type="button" class="btn btn-gradient btn-lg w-100 fw-bold" onclick="startBroadcast()">
                    <i class="bi bi-rocket-takeoff"></i> LUNCURKAN BROADCAST NOW!
                </button>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card card-custom p-4 bg-white">
                <h6 class="fw-bold text-muted">Status:</h6>
                <div id="log-status" class="p-3 bg-light border rounded-3" style="font-family: monospace; font-size: 13px;">Belum ada aktivitas...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Gunakan URL lengkap
   const API_URL = "https://aplikasi.jasapromosi.web.id:3000";

    async function initBroadcastPage() {
        const selectEl = document.getElementById("select-folder");
        try {
            const response = await fetch(`${API_URL}/api_get_folders`);
            const result = await response.json();
            
            if (result.status === "success") {
                selectEl.innerHTML = '<option value="">-- Pilih Folder --</option>';
                result.data.forEach(folder => {
                    selectEl.innerHTML += `<option value="${folder.id}">${folder.nama_folder} (${folder.total_kontak} kontak)</option>`;
                });
            }
        } catch (error) {
            console.error(error);
            selectEl.innerHTML = '<option value="">Server tidak merespon (Cek Port 3000)</option>';
        }
    }

    async function startBroadcast() {
        const folderId = document.getElementById("select-folder").value;
        const pesan = document.getElementById("input-pesan").value;
        const logBox = document.getElementById("log-status");

        if(!folderId || !pesan) return alert("Pilih folder dan isi pesan!");
        
        logBox.innerHTML = "Memproses...";
        
        try {
            const response = await fetch(`${API_URL}/send-message`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ folder_id: folderId, pesan: pesan })
            });
            const result = await response.json();
            logBox.innerHTML = result.message;
        } catch (e) {
            logBox.innerHTML = "Gagal kirim. Pastikan port 3000 terbuka di firewall VPS.";
        }
    }

    window.onload = initBroadcastPage;
</script>
</body>
</html>
