<script>
    const urlParams = new URLSearchParams(window.location.search);
    const FOLDER_ID = urlParams.get('id');

    const BASE_URL = "/api";
    const API_GET_CONTACTS = BASE_URL + "/api_get_contacts?folder_id=" + FOLDER_ID;
    const API_CREATE_CONTACT = BASE_URL + "/api_create_contact";
    const API_DELETE_CONTACT = BASE_URL + "/api_delete_contact";

    // 1. AMBIL DATA KONTAK
    async function loadContacts() {
        if(!FOLDER_ID) { window.location.href = "index.html"; return; }

        const tbody = document.getElementById("target-list-kontak");
        const titleEl = document.getElementById("text-nama-folder");

        try {
            const response = await fetch(API_GET_CONTACTS);
            const result = await response.json();

            if(result.status === "success") {
                titleEl.innerText = "Folder ID: " + FOLDER_ID;
                tbody.innerHTML = "";

                if(!result.data || result.data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">Belum ada nomor WA di folder ini.</td></tr>`;
                    return;
                }

                result.data.forEach(kontak => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-semibold text-dark">${kontak.nama || '-'}</td>
                            <td><a href="https://wa.me/${kontak.nomor_wa}" target="_blank" class="text-decoration-none text-dark">${kontak.nomor_wa}</a></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteContact(${kontak.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-danger">Gagal memuat data.</td></tr>`;
            }
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">Gagal terhubung ke server!</td></tr>`;
        }
    }

    // 2. SIMPAN KONTAK
    async function saveContact() {
        const nama = document.getElementById("input-nama-kontak").value;
        const nomor = document.getElementById("input-nomor-wa").value;

        try {
            const response = await fetch(API_CREATE_CONTACT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ folder_id: FOLDER_ID, nama: nama, nomor_wa: nomor })
            });
            const res = await response.json();
            if(res.status === "success") {
                bootstrap.Modal.getInstance(document.getElementById('modalTambahKontak')).hide();
                loadContacts();
            } else {
                alert("Gagal menyimpan kontak");
            }
        } catch(e) { alert("Error koneksi"); }
    }

    // 3. HAPUS KONTAK
    async function deleteContact(id) {
        if(!confirm("Yakin hapus kontak ini?")) return;
        try {
            const response = await fetch(API_DELETE_CONTACT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: id })
            });
            loadContacts();
        } catch(e) { alert("Gagal Hapus"); }
    }

    window.onload = loadContacts;
</script>
