<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Management - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-gradient { background: linear-gradient(135deg, #25D366, #128C7E); color: white; border: none; }
        .btn-gradient:hover { color: white; opacity: 0.9; }
        /* Style Tambahan untuk Tombol Broadcast agar Konsisten */
        .btn-broadcast { background: linear-gradient(135deg, #0d6efd, #0a58ca); color: white; border: none; }
        .btn-broadcast:hover { color: white; opacity: 0.9; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 card-custom">
        <div>
            <h4 class="fw-bold text-success mb-0"><i class="bi bi-whatsapp"></i> WA Magic <span class="badge bg-secondary" style="font-size: 12px;">SaaS</span></h4>
            <small class="text-muted">Dashboard Pengirim Pesan Kilat</small>
        </div>
        <button class="btn btn-sm btn-outline-danger fw-semibold"><i class="bi bi-box-arrow-right"></i> Keluar</button>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <button class="btn btn-gradient w-100 py-2.5 fw-bold card-custom fs-5" data-bs-toggle="modal" data-bs-target="#modalBuatFolder">
                <i class="bi bi-folder-plus"></i> Buat Folder
            </button>
        </div>
        <div class="col-md-4">
            <a href="broadcast.html" class="btn btn-broadcast w-100 py-2.5 fw-bold card-custom fs-5 text-white text-decoration-none d-block text-center">
                <i class="bi bi-send-check"></i> Broadcast Pesan
            </a>
        </div>
        <div class="col-md-4">
            <button class="btn btn-light border w-100 py-2.5 fw-semibold card-custom fs-5 text-muted" onclick="loadFolders()">
                <i class="bi bi-arrow-clockwise"></i> Refresh Data
            </button>
        </div>
    </div>

    <div class="card card-custom p-4 bg-white">
        <h6 class="fw-bold text-muted mb-3">Daftar Kategori / Folder Anda</h6>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nama Folder / Keyword</th>
                        <th>Total Kontak</th>
                        <th class="text-end">Aksi</th>
                    </tr>
                </thead>
                <tbody id="target-list-folder">
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">
                            <div class="spinner-border spinner-border-sm text-success me-2" role="status"></div>
                            Sedang memuat daftar folder...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalBuatFolder" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: 12px;">
      <div class="modal-header">
        <h5 class="modal-title fw-bold text-success"><i class="bi bi-folder-plus"></i> Buat Folder Baru</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Nama Folder / Kategori Kontak</label>
            <input type="text" id="input-nama-folder" class="form-control" placeholder="Contoh: grup emak - emak rempong">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Batal</button>
        <button type="button" class="btn btn-success px-4" onclick="saveFolder()">Simpan Folder</button>
      </div>
    </div>
  </div>
</div>

<script>
    // URL API Backend cPanel Mas Bro
  const BASE_URL          = "http://109.111.53.203:3000";
    const API_GET_FOLDERS   = BASE_URL + "/api_get_folders";
    const API_CREATE_FOLDER = BASE_URL + "/api_create_folder"; // Nanti kita buat di server.js
    const API_DELETE_FOLDER = BASE_URL + "/api_delete_folder"; // Nanti kita buat di server.js

    // 1. FUNGSI MENAMPILKAN SEMUA FOLDER DARI DATABASE
    async function loadFolders() {
        const tbody = document.getElementById("target-list-folder");
        if(!tbody) return;

        try {
            const response = await fetch(API_GET_FOLDERS);
            const result = await response.json();

            if (result.status === "success") {
                tbody.innerHTML = "";
                
                if(result.data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">Belum ada folder yang dibuat. Silakan klik tombol Buat Folder!</td></tr>`;
                    return;
                }

                result.data.forEach(folder => {
                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <span class="fw-bold text-dark d-block">${folder.nama_folder}</span>
                                <small class="text-muted" style="font-size:11px;">Dibuat: ${folder.created_at}</small>
                            </td>
                            <td><span class="badge bg-light text-success border border-success-subtle">${folder.total_kontak} Nomor</span></td>
                            <td class="text-end">
                                <a href="folder_detail.html?id=${folder.id}" class="btn btn-sm btn-outline-success me-1">
                                    <i class="bi bi-eye"></i> Kelola
                               </a>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteFolder(${folder.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">Gagal: ${result.message}</td></tr>`;
            }
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">Gagal terhubung ke server API cPanel!</td></tr>`;
        }
    }

    // 2. FUNGSI MENYIMPAN FOLDER BARU
    async function saveFolder() {
        const inputElement = document.getElementById("input-nama-folder");
        const namaFolderVal = inputElement.value.trim();

        if (!namaFolderVal) {
            alert("Nama folder tidak boleh kosong ya mas bro!");
            return;
        }

        try {
            const response = await fetch(API_CREATE_FOLDER, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nama_folder: namaFolderVal })
            });
            const result = await response.json();

            if (result.status === "success") {
                inputElement.value = ""; // Kosongkan form input

                // Tutup Modal Pop-up otomatis
                const modalEl = document.getElementById('modalBuatFolder');
                const modalInstance = bootstrap.Modal.getOrCreateInstance(modalEl);
                modalInstance.hide();

                loadFolders(); // Refresh tabel biar folder baru langsung muncul
            } else {
                alert("Gagal: " + result.message);
            }
        } catch (error) {
            alert("Terjadi kesalahan saat menyambung ke API Buat Folder!");
        }
    }

    // 3. FUNGSI MENGHAPUS FOLDER DAN SEMUA ISI KONTAKNYA
    async function deleteFolder(idFolder) {
        if(!confirm("PERINGATAN MAS BRO!\nMenghapus folder ini juga akan otomatis MENGHAPUS SEMUA nomor WA di dalamnya.\n\nYakin ingin menghapus?")) return;

        try {
            const response = await fetch(API_DELETE_FOLDER, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ folder_id: idFolder })
            });
            const result = await response.json();
            
            if(result.status === "success") {
                loadFolders(); // Refresh daftar folder otomatis setelah dihapus
            } else {
                alert("Gagal menghapus: " + result.message);
            }
        } catch (error) {
            alert("Gagal koneksi ke API Hapus Folder cPanel!");
        }
    }

    // Jalankan pemuatan data otomatis saat halaman selesai dimuat browser
    window.addEventListener("DOMContentLoaded", loadFolders);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
