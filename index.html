<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoloWorker SaaS - Kelola Folder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-gradient { background: linear-gradient(135deg, #25D366, #128C7E); color: white; border: none; }
        .btn-gradient:hover { color: white; opacity: 0.9; }
    </style>
</head>
<body>

<div class="container py-4">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0 text-success"><i class="bi bi-whatsapp"></i> SoloWorker <span class="badge bg-secondary fs-6">SaaS</span></h4>
            <small class="text-muted">Dashboard Pengirim Pesan Kilat</small>
        </div>
        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Keluar</button>
    </div>

    <!-- Tombol Utama -->
    <div class="card card-custom p-3 mb-4 bg-white">
        <div class="row g-2">
            <div class="col-6">
                <button class="btn btn-gradient w-100 py-2 fw-semibold text-nowrap" data-bs-toggle="modal" data-bs-target="#modalTambahFolder">
                    <i class="bi bi-folder-plus"></i> Buat Folder
                </button>
            </div>
            <div class="col-6">
                <button class="btn btn-light border w-100 py-2 fw-semibold text-muted text-nowrap" onclick="loadFolders()">
                    <i class="bi bi-arrow-clockwise"></i> Refresh Data
                </button>
            </div>
        </div>
    </div>

    <!-- Daftar Folder -->
    <div class="card card-custom p-3 bg-white">
        <h6 class="fw-bold text-muted mb-3">Daftar Kategori / Folder Anda</h6>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nama Folder / Keyword</th>
                        <th class="text-center">Total Kontak</th>
                        <th class="text-end">Aksi</th>
                    </tr>
                </thead>
                <tbody id="target-list-folder">
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">
                            <div class="spinner-border spinner-border-sm text-success me-2" role="status"></div>
                            Sedang memuat data dari server...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL POP-UP: INPUT BUAT FOLDER BARU -->
<div class="modal fade" id="modalTambahFolder" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: 12px;">
      <div class="modal-header">
        <h5 class="modal-title fw-bold text-success"><i class="bi bi-folder-plus"></i> Tambah Folder Baru</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Nama Folder / Kategori Data</label>
            <input type="text" id="input-nama-folder" class="form-control form-control-lg" placeholder="Contoh: Pesanan Hijab Olshop">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Batal</button>
        <button type="button" class="btn btn-success px-4" onclick="saveFolder()">Simpan Folder</button>
      </div>
    </div>
  </div>
</div>

<script>
    // PASTIKAN file PHP ini ditaruh langsung di folder utama subdomain (public_html/api atau root subdomain)
    const API_GET = "https://api.jasapromosi.web.id/api_get_folders.php";
    const API_CREATE = "https://api.jasapromosi.web.id/api_create_folder.php";

    // 1. FUNGSI MENAMPILKAN DATA
    async function loadFolders() {
        const tbody = document.getElementById("target-list-folder");
        try {
            const response = await fetch(API_GET);
            const result = await response.json();
            if (result.status === "success") {
                tbody.innerHTML = "";
                if (result.data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">Belum ada folder. Silakan klik tombol <b>Buat Folder</b> di atas!</td></tr>`;
                    return;
                }
                result.data.forEach(folder => {
                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <span class="fw-semibold text-dark">${folder.nama_folder}</span><br>
                                <small class="text-muted" style="font-size: 11px;">Dibuat: ${folder.created_at}</small>
                            </td>
                            <td class="text-center">
                                <span class="badge bg-success-subtle text-success border border-success-subtle px-2 py-1">${folder.total_kontak} Nomor</span>
                            </td>
                            <td class="text-end">
                                <a href="folder_detail.html?id=${folder.id}" class="btn btn-sm btn-outline-success">
                                    <i class="bi bi-eye"></i> Kelola
                                </a>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">Database Eror: ${result.message}</td></tr>`;
            }
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">Gagal terhubung ke backend cPanel! <br><small class="text-muted">Periksa jaringan atau pastikan file PHP & SSL subdomain aktif.</small></td></tr>`;
            console.error("Eror Fetching:", error);
        }
    }

    // 2. FUNGSI MENYIMPAN DATA FOLDER BARU
    async function saveFolder() {
        const inputNama = document.getElementById("input-nama-folder");
        const namaFolderValue = inputNama.value.trim();

        if(!namaFolderValue) {
            alert("Nama folder wajib diisi mas bro!");
            return;
        }

        try {
            const response = await fetch(API_CREATE, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nama_folder: namaFolderValue })
            });
            const result = await response.json();

            if(result.status === "success") {
                alert("MANTAP! Folder baru berhasil dibuat.");
                inputNama.value = ""; // Kosongkan inputan
                
                // BERHASIL DIPERBAIKI: Menggunakan bootstrap.Modal (huruf m kecil) agar tidak macet
                const modalEl = document.getElementById('modalTambahFolder');
                const modalInstance = bootstrap.Modal.getOrCreateInstance(modalEl);
                modalInstance.hide();

                loadFolders(); // Refresh daftar tabel otomatis
            } else {
                alert("Waduh Gagal: " + result.message);
            }
        } catch (error) {
            alert("Gagal mengirim data ke server cPanel! Periksa log console browser.");
            console.error("Eror Menambah Folder:", error);
        }
    }

    window.onload = loadFolders;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
